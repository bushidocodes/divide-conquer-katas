name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show compiler version
        run: gcc --version

      - name: Build all katas
        run: make all

      - name: Run tests
        run: make test
