name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Show compiler version
        run: gcc --version

      - name: Build all katas
        run: make all

      - name: Run tests
        run: make test


  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang
        run: sudo apt-get update -qq && sudo apt-get install -y clang
      - name: Build and test under ASan+UBSan
        env:
          CC: clang
          CFLAGS: -std=c2x -Wall -Wextra -pedantic -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
        run: make clean && make test
